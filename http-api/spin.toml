#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "http-api"
version = "0.1.0"
authors = ["Thorsten Hans <thans@akamai.com>"]
description = ""

[variables]
db_host = { default = "localhost" }
db_port = { default = "5432" }
db_user = { default = "postgres" }
db_pass = { default = "password", secret = true }
db_name = { default = "postgres" }

[[trigger.http]]
route = "/..."
component = "http-api"

[component.http-api]
source = "target/wasm32-wasip1/release/http_api.wasm"
allowed_outbound_hosts = ["postgres://{{ db_host }}:{{ db_port }}"]

[component.http-api.variables]
pg_connection_string = "postgres://{{ db_user }}:{{ db_pass }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"

[component.http-api.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
